name: 毎日サンプル情報収集

on:
  schedule:
    # 毎日 07:00 JST (= 前日 22:00 UTC)
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # 収集（0件なら異常終了し、このジョブが失敗→GitHubから通知が届く）
      - name: イベントを収集
        run: npm run collect

      - name: 変更があればコミット＆プッシュ
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          if git diff --staged --quiet; then
            echo "更新なし"
          else
            git commit -m "chore: 毎日のサンプル情報更新"
            git push
          fi
